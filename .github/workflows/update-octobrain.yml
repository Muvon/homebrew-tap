name: Update octobrain Formula

on:
  repository_dispatch:
    types: [octobrain-release]

jobs:
  update:
    name: Update octobrain formula to ${{ github.event.client_payload.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Compute SHA256 hash
        id: hashes
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          BASE="https://github.com/Muvon/octobrain/releases/download/${VERSION}"

          SHA_ARM=$(curl -fsSL "${BASE}/octobrain-${VERSION}-aarch64-apple-darwin.tar.gz" | sha256sum | awk '{print $1}')

          echo "sha_arm=${SHA_ARM}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${{ steps.hashes.outputs.version }}"
          SHA_ARM="${{ steps.hashes.outputs.sha_arm }}"

          FORMULA="Formula/octobrain.rb"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          awk -v sha_arm="$SHA_ARM" '
            /on_arm/  { in_arm=1 }
            /end/     { in_arm=0 }
            in_arm && /sha256/ { sub(/"[a-f0-9]+"/, "\"" sha_arm "\"") }
            { print }
          ' "$FORMULA" > "$FORMULA.tmp" && mv "$FORMULA.tmp" "$FORMULA"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/octobrain.rb
          git commit -m "octobrain ${{ steps.hashes.outputs.version }}"
          git push
